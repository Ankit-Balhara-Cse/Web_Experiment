<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="pixel_store_logo.svg"  style="height: 50px;">
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <div class="logo">
                <span class="logo-pixel">PIXEL</span><span class="logo-store">STORE</span>
            </div>

            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
            </ul>

            <div class="nav-action">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-bar" placeholder="Search gear...">
                </div>
                <button class="cart-btn" id="cart-display">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <p class="hero-eyebrow">New Arrivals 2025</p>
            <h1 class="hero-title">Next-Level<br><em>Gaming Gear</em></h1>
            <p class="hero-sub">Pro peripherals, cutting-edge components, and everything in between.</p>
        </div>
        <div class="hero-glow"></div>
    </header>

    <section class="products">
        <div class="section-header">
            <h2>Featured Gear</h2>
            <span class="product-count" id="product-count">15 products</span>
        </div>
        <div class="product_grid"></div>
    </section>

    <footer class="footer">
        <div class="footer-inner">
            <div class="logo"><span class="logo-pixel">PIXEL</span><span class="logo-store">STORE</span></div>
            <p class="footer-copy">© 2025 Pixel Store. Built with vanilla HTML, CSS & JS.</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="render.js"></script>
    <script src="search.js"></script>
    <script>
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("nav-links");
        hamburger.addEventListener("click", function () {
            navLinks.classList.toggle("open");
            hamburger.classList.toggle("active");
        });
    </script>
</body>
</html>
